      - name: Load or pull kind node image
        run: |
          if [ -f /tmp/kind-node.tar ]; then
            docker load -i /tmp/kind-node.tar
          else
            make kind-dockerhub-pull
            docker save kindest/node:${{ env.K8S_VERSION }} -o /tmp/kind-node.tar
          fi

      - name: Create kind cluster
        run: |
          pipx install jinjanator==${{ env.JINJANATOR_VERSION }}
          make kind-init-ipv4

      - name: Install kube-ovn
        run: make kind-install-overlay-ipv4

      - name: Install multus
        run: make kind-install-multus

      - name: Run master e2e
        id: e2e
        working-directory: test/e2e/source
        env:
          E2E_BRANCH: ${{ env.TARGET_BRANCH }}
          E2E_IP_FAMILY: ipv4
          E2E_NETWORK_MODE: overlay
        run: make kube-ovn-multus-conformance-e2e

      - name: Check kube ovn pod restarts
        if: always()
        env:
          EXPORT_COMPONENT_ERROR_LOGS: ${{ steps.e2e.conclusion == 'failure' }}
        run: make check-kube-ovn-pod-restarts

  master-iptables-vpc-nat-gw-e2e:
    name: Master iptables vpc nat gw e2e
    needs:
      - kind-preflight
      - build-kube-ovn
      - build-vpc-nat-gateway
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          docker-images: false
          large-packages: false
          tool-cache: false
          swap-storage: false

      - uses: actions/checkout@v6

      - name: Set K8S_VERSION from kind.mk
        run: echo "K8S_VERSION=$(grep '^K8S_VERSION' makefiles/kind.mk | awk -F'?= ' '{print $2}')" >> "$GITHUB_ENV"

      - name: Check out master e2e source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.E2E_SOURCE_BRANCH }}
