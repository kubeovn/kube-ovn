      - name: Check kube ovn pod restarts
        if: always()
        env:
          EXPORT_COMPONENT_ERROR_LOGS: ${{ steps.e2e.conclusion == 'failure' }}
        run: make check-kube-ovn-pod-restarts

  master-multus-e2e:
    name: Master multus e2e
    needs:
      - kind-preflight
      - build-kube-ovn
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          docker-images: false
          large-packages: false
          tool-cache: false
          swap-storage: false

      - uses: actions/checkout@v6

      - name: Set K8S_VERSION from kind.mk
        run: echo "K8S_VERSION=$(grep '^K8S_VERSION' makefiles/kind.mk | awk -F'?= ' '{print $2}')" >> "$GITHUB_ENV"

      - name: Check out master e2e source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.E2E_SOURCE_BRANCH }}
