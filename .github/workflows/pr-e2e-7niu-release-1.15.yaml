      - name: Install ginkgo
        working-directory: test/e2e/source
        run: go install -v github.com/onsi/ginkgo/v2/ginkgo@${{ env.GINKGO_VERSION }}

      - name: Download image
        uses: actions/download-artifact@v7
        with:
          name: kube-ovn

      - name: Load image
        run: docker load --input kube-ovn.tar

      - name: Cache kind node image
        uses: actions/cache@v4
        with:
          path: /tmp/kind-node.tar
          key: kind-node-${{ env.K8S_VERSION }}

      - name: Load or pull kind node image
        run: |
          if [ -f /tmp/kind-node.tar ]; then
            docker load -i /tmp/kind-node.tar
          else
            make kind-dockerhub-pull
            docker save kindest/node:${{ env.K8S_VERSION }} -o /tmp/kind-node.tar
          fi

      - name: Create kind cluster
        run: |
          pipx install jinjanator==${{ env.JINJANATOR_VERSION }}
          make kind-init-ha-ipv4

      - name: Install kube-ovn
        run: make kind-install-ipv4

      - name: Run master e2e
        id: e2e
        working-directory: test/e2e/source
        env:
          E2E_BRANCH: ${{ env.TARGET_BRANCH }}
          E2E_IP_FAMILY: ipv4
          E2E_NETWORK_MODE: overlay
