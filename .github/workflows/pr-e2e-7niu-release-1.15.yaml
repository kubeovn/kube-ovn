      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          install_only: true

      - name: Install ginkgo
        working-directory: test/e2e/source
        run: go install -v github.com/onsi/ginkgo/v2/ginkgo@${{ env.GINKGO_VERSION }}

      - name: Download image
        uses: actions/download-artifact@v7
        with:
          name: kube-ovn

      - name: Load image
        run: docker load --input kube-ovn.tar

      - name: Cache kind node image
        uses: actions/cache@v4
        with:
          path: /tmp/kind-node.tar
