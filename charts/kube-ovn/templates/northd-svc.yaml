kind: Service
apiVersion: v1
metadata:
  name: ovn-northd
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - name: ovn-northd
      protocol: TCP
      port: 6643
      targetPort: 6643
  type: ClusterIP
  {{- if eq .Values.networking.NET_STACK "dual_stack" }}
  ipFamilyPolicy: PreferDualStack
  {{- end }}
  selector:
    app: ovn-central
    {{- if ne .Values.OVN_CENTRAL_MODE "single" }}
    ovn-northd-leader: "true"
    {{- end }}
  sessionAffinity: None
