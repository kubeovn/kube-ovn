kind: Service
apiVersion: v1
metadata:
  name: ovn-nb
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - name: ovn-nb
      protocol: TCP
      port: 6641
      targetPort: 6641
  type: ClusterIP
  {{- if eq .Values.networking.NET_STACK "dual_stack" }}
  ipFamilyPolicy: PreferDualStack
  {{- end }}
  selector:
    app: ovn-central
    {{- if ne .Values.OVN_CENTRAL_MODE "single" }}
    ovn-nb-leader: "true"
    {{- end }}
  sessionAffinity: None
