{{- if and .Values.networking.ENABLE_SSL .Values.func.ENABLE_OVN_DB_TLS_CERT }}
{{- $existingCA := lookup "v1" "Secret" .Values.namespace "ovn-db-tls-ca" }}
{{- $existingServer := lookup "v1" "Secret" .Values.namespace "ovn-db-tls-server" }}
{{- $existingClient := lookup "v1" "Secret" .Values.namespace "ovn-db-tls-client" }}
{{- if eq .Values.installMode "dataPlaneOnly" }}
  {{- if or (not $existingCA) (not $existingClient) }}
    {{- fail (printf "installMode=dataPlaneOnly with func.ENABLE_OVN_DB_TLS_CERT=true requires ovn-db-tls-ca and ovn-db-tls-client Secrets in namespace %q to be pre-seeded from the management cluster." .Values.namespace) }}
  {{- end }}
{{- else }}
{{- $ca := genCA "ovn-db-tls-ca" 3650 -}}
{{- if $existingCA }}
  {{- if not (and (hasKey $existingCA.data "ca.crt") (hasKey $existingCA.data "ca.key")) }}
    {{- fail "existing ovn-db-tls-ca Secret must contain ca.crt and ca.key" }}
  {{- end }}
  {{- $ca = buildCustomCert (index $existingCA.data "ca.crt") (index $existingCA.data "ca.key") -}}
{{- end }}
{{- $serverIPs := list -}}
{{- range $ip := splitList "," (include "kubeovn.ovnCentralNodeIPs" .) }}
  {{- $trimmed := trim $ip -}}
  {{- if $trimmed }}
    {{- $serverIPs = append $serverIPs $trimmed -}}
  {{- end }}
{{- end }}
{{- $serverDNS := list
  "ovn-nb"
  (printf "ovn-nb.%s" .Values.namespace)
  (printf "ovn-nb.%s.svc" .Values.namespace)
  (printf "ovn-nb.%s.svc.cluster.local" .Values.namespace)
  "ovn-sb"
  (printf "ovn-sb.%s" .Values.namespace)
  (printf "ovn-sb.%s.svc" .Values.namespace)
  (printf "ovn-sb.%s.svc.cluster.local" .Values.namespace)
-}}
{{- $server := genSignedCert "ovn-db-tls-server" $serverIPs $serverDNS 3650 $ca -}}
{{- $client := genSignedCert "ovn-db-tls-client" nil nil 3650 $ca -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: ovn-db-tls-ca
  namespace: {{ .Values.namespace }}
data:
  {{- if $existingCA }}
  ca.crt: {{ index $existingCA.data "ca.crt" }}
  ca.key: {{ index $existingCA.data "ca.key" }}
  ca-bundle.crt: {{ default (index $existingCA.data "ca.crt") (index $existingCA.data "ca-bundle.crt") }}
  {{- else }}
  ca.crt: {{ b64enc $ca.Cert }}
  ca.key: {{ b64enc $ca.Key }}
  ca-bundle.crt: {{ b64enc $ca.Cert }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ovn-db-tls-server
  namespace: {{ .Values.namespace }}
data:
  {{- if $existingServer }}
  ca.crt: {{ index $existingServer.data "ca.crt" }}
  ca-bundle.crt: {{ default (index $existingServer.data "ca.crt") (index $existingServer.data "ca-bundle.crt") }}
  server.crt: {{ index $existingServer.data "server.crt" }}
  server.key: {{ index $existingServer.data "server.key" }}
  {{- else }}
  ca.crt: {{ b64enc $ca.Cert }}
  ca-bundle.crt: {{ b64enc $ca.Cert }}
  server.crt: {{ b64enc $server.Cert }}
  server.key: {{ b64enc $server.Key }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ovn-db-tls-client
  namespace: {{ .Values.namespace }}
data:
  {{- if $existingClient }}
  ca.crt: {{ index $existingClient.data "ca.crt" }}
  ca-bundle.crt: {{ default (index $existingClient.data "ca.crt") (index $existingClient.data "ca-bundle.crt") }}
  client.crt: {{ index $existingClient.data "client.crt" }}
  client.key: {{ index $existingClient.data "client.key" }}
  {{- else }}
  ca.crt: {{ b64enc $ca.Cert }}
  ca-bundle.crt: {{ b64enc $ca.Cert }}
  client.crt: {{ b64enc $client.Cert }}
  client.key: {{ b64enc $client.Key }}
  {{- end }}
{{- end }}
{{- end }}
