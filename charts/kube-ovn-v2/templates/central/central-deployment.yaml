{{- $centralImage := include "kubeovn.imageSpec" (dict "root" . "image" .Values.central.image) | fromYaml -}}
kind: {{ ternary "StatefulSet" "Deployment" .Values.central.hcp.enabled }}
apiVersion: apps/v1
metadata:
  name: ovn-central
  namespace: {{ include "kubeovn.centralNamespace" . }}
  {{- with .Values.central.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.central.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ include "kubeovn.centralReplicas" . }}
  {{- if .Values.central.hcp.enabled }}
  serviceName: ovn-central
  podManagementPolicy: Parallel
  {{- end }}
  {{- if not .Values.central.hcp.enabled }}
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ovn-central
      app.kubernetes.io/part-of: kube-ovn
  template:
    metadata:
      {{- with .Values.central.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: ovn-central
        app.kubernetes.io/part-of: kube-ovn
        {{- with .Values.central.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        # Legacy labels
        app: ovn-central
        component: network
        type: infra
    spec:
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
        - key: CriticalAddonsOnly
          operator: Exists
      affinity:
        {{- include "kube-ovn.affinities.nodeAffinity" (dict "hardcodedRequired" (include "kubeovn.masterNodeRequired" . | fromYamlArray) "userPreferred" .Values.central.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution "userRequired" .Values.central.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution) | nindent 8 }}
        {{- if not .Values.central.hcp.enabled }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ovn-central
              topologyKey: kubernetes.io/hostname
        {{- end }}
      priorityClassName: system-cluster-critical
      serviceAccountName: {{ ternary "ovn-central" "ovn-ovs" .Values.central.hcp.enabled }}
      automountServiceAccountToken: true
      hostNetwork: {{ ternary "false" "true" .Values.central.hcp.enabled }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: {{ ternary "volume-init" "hostpath-init" .Values.central.hcp.enabled }}
          image: {{ $centralImage.prefix }}{{ $centralImage.repository }}:{{ $centralImage.tag }}
          imagePullPolicy: {{ $centralImage.pullPolicy }}
          command:
            - sh
            - -c
            - "chown -R nobody: /var/run/ovn /etc/ovn /var/log/ovn"
          securityContext:
            allowPrivilegeEscalation: {{ ternary "false" "true" .Values.central.hcp.enabled }}
            capabilities:
              {{- if .Values.central.hcp.enabled }}
              add:
                - CHOWN
              {{- end }}
              drop:
                - ALL
            privileged: {{ ternary "false" "true" .Values.central.hcp.enabled }}
            runAsUser: 0
          volumeMounts:
            - mountPath: /var/run/ovn
              name: {{ ternary "run-ovn" "host-run-ovn" .Values.central.hcp.enabled }}
            - mountPath: /etc/ovn
              name: {{ ternary "ovn-data" "host-config-ovn" .Values.central.hcp.enabled }}
            - mountPath: /var/log/ovn
              name: {{ ternary "log-ovn" "host-log-ovn" .Values.central.hcp.enabled }}
      containers:
        - name: ovn-central
          image: {{ $centralImage.prefix }}{{ $centralImage.repository }}:{{ $centralImage.tag }}
          imagePullPolicy: {{ $centralImage.pullPolicy }}
          command: 
          - bash
          - /kube-ovn/start-db.sh
          securityContext:
            runAsUser: {{ include "kubeovn.runAsUser" . }}
            privileged: false
            capabilities:
              add:
                - NET_BIND_SERVICE
                - SYS_NICE
          env:
{{- include "kubeovn.ovnCentralTLSEnv" . | nindent 12 }}
            {{- if .Values.central.hcp.enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: NODE_IPS
              value: "{{ ternary (include "kubeovn.centralRaftAddresses" .) (include "kubeovn.ovnDbAddresses" .) .Values.central.hcp.enabled }}"
            {{- if .Values.central.hcp.enabled }}
            - name: DB_CLUSTER_ADDR
              value: "$(POD_NAME).ovn-central.$(POD_NAMESPACE).svc"
            {{- end }}
            - name: POD_IP
              {{- if .Values.central.hcp.enabled }}
              value: "$(DB_CLUSTER_ADDR)"
              {{- else }}
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
              {{- end }}
            {{- if not .Values.central.hcp.enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: POD_IPS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIPs
            - name: ENABLE_BIND_LOCAL_IP
              value: "{{ ternary false .Values.features.ENABLE_BIND_LOCAL_IP .Values.central.hcp.enabled }}"
            - name: PROBE_INTERVAL
              value: "{{ .Values.ovsOvn.probeInterval }}"
            - name: OVN_NORTHD_PROBE_INTERVAL
              value: "{{ .Values.central.ovnNorthdProbeInterval}}"
            - name: OVN_LEADER_PROBE_INTERVAL
              value: "{{ .Values.central.ovnLeaderProbeInterval }}"
            - name: OVN_NORTHD_N_THREADS
              value: "{{ .Values.central.ovnNorthdNThreads }}"
            - name: ENABLE_COMPACT
              value: "{{ .Values.networking.enableCompact }}"
            - name: OVN_VERSION_COMPATIBILITY
              value: {{ .Values.ovsOvn.upgrade.versionCompatibility | quote }}
            {{- with .Values.central.extraEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.central.resources }}
          resources:
            {{- toYaml . | trim | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /var/run/ovn
              name: {{ ternary "run-ovn" "host-run-ovn" .Values.central.hcp.enabled }}
            - mountPath: /etc/ovn
              name: {{ ternary "ovn-data" "host-config-ovn" .Values.central.hcp.enabled }}
            - mountPath: /var/log/ovn
              name: {{ ternary "log-ovn" "host-log-ovn" .Values.central.hcp.enabled }}
            {{- if not .Values.central.hcp.enabled }}
            - mountPath: /etc/localtime
              name: localtime
              readOnly: true
            {{- end }}
            - mountPath: /var/run/tls
              name: kube-ovn-tls
          readinessProbe:
            exec:
              command:
                - bash
                - /kube-ovn/ovn-healthcheck.sh
            periodSeconds: 15
            timeoutSeconds: 45
          livenessProbe:
            exec:
              command:
                - bash
                - /kube-ovn/ovn-healthcheck.sh
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 45
      nodeSelector:
        kubernetes.io/os: "linux"
        {{ .Values.masterNodesLabels | toYaml | nindent 8 }}
      volumes:
        {{- if .Values.central.hcp.enabled }}
        - name: run-ovn
          emptyDir: {}
        - name: log-ovn
          emptyDir: {}
        {{- else }}
        - name: host-run-ovn
          hostPath:
            path: /run/ovn
        - name: host-config-ovn
          hostPath:
            path: {{ .Values.ovsOvn.ovnDirectory }}
        - name: host-log-ovn
          hostPath:
            path: {{ .Values.logging.directory }}/ovn
        - name: localtime
          hostPath:
            path: /etc/localtime
        {{- end }}
        - name: kube-ovn-tls
          secret:
            optional: true
            secretName: kube-ovn-tls
  {{- if .Values.central.hcp.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: ovn-data
        labels:
          app.kubernetes.io/name: ovn-central
          app.kubernetes.io/part-of: kube-ovn
          app: ovn-central
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.central.hcp.storage.size }}
        {{- if .Values.central.hcp.storage.storageClassName }}
        storageClassName: {{ .Values.central.hcp.storage.storageClassName | quote }}
        {{- end }}
  {{- end }}
