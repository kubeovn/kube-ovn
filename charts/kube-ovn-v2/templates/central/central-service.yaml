{{- if .Values.central.separated.enabled }}
kind: Service
apiVersion: v1
metadata:
  name: ovn-central
  namespace: {{ include "kubeovn.centralNamespace" . }}
  {{- with .Values.central.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.central.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: nb-raft
      protocol: TCP
      port: 6643
      targetPort: 6643
    - name: sb-raft
      protocol: TCP
      port: 6644
      targetPort: 6644
  selector:
    app.kubernetes.io/name: ovn-central
    app.kubernetes.io/part-of: kube-ovn
{{- end }}
